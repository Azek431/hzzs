# ============================================================
# HZZS 项目级 Gradle 构建配置
# ============================================================
#
# 目标机器画像（本机实测）：
# - CPU：[low-core CPU]（2 核 / 4 线程）
# - 内存：约 low-memory profile，常与 VS Code / Claude / Serena 共存
#
# 原则：
# 1. 优先增量与缓存命中，而不是盲目拉高堆导致换页。
# 2. Worker 数量不超过逻辑核，并给 IDE / 语言服务留余量。
# 3. Configuration Cache / Build Cache 默认开启。
# 4. 本机 Debug 可用 hzzs.native.abis 只编真机 ABI 加速。
# ============================================================

# ── Daemon JVM ──────────────────────────────────────────────
# 4g 在 low-memory + IDE 场景会与 JetBrains Kotlin / 双 Claude 抢内存并触发换页。
# 1536m 足够单模块 Kotlin/Compose；完整 Release R8 高峰仍可接受。
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# ── 并行与 worker ───────────────────────────────────────────
org.gradle.parallel=true
# 4 逻辑核：2 个 worker 留给编译，其余留给 IDE / 系统
org.gradle.workers.max=2
org.gradle.daemon=true

# ── 缓存 ────────────────────────────────────────────────────
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.configuration-cache.problems=warn

# ── Android ─────────────────────────────────────────────────
android.useAndroidX=true
android.nonTransitiveRClass=true
# 本机已装 SDK，禁止 Gradle 在后台静默拉 SDK 组件
android.builder.sdkDownload=false

# ── Kotlin / kapt ───────────────────────────────────────────
kotlin.code.style=official
kotlin.incremental=true
kotlin.incremental.android=true
# Kotlin 编译器独立堆；与 Gradle daemon 分离，避免互相挤爆
kotlin.daemon.jvmargs=-Xmx768m -XX:MaxMetaspaceSize=256m
# Hilt 仍走 legacy-kapt；增量注解处理
kapt.incremental.apt=true
kapt.include.compile.classpath=false

# ── 本机 Debug 原生加速（可选）──────────────────────────────
# 默认编 arm64 + armeabi-v7a + x86_64（真机 + 模拟器 + 旧 32 位）。
# 日常只在 arm64 真机调试时可取消下一行注释，原生编译量约降为 1/3：
# hzzs.native.abis=arm64-v8a
#
# 仅模拟器：
# hzzs.native.abis=x86_64
#
# 发布 / CI 不要设置该属性，保持完整 ABI。
