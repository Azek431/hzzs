# ============================================================
# Gradle 项目级配置
# ============================================================
#
# 目标：
# - 适配 low-memory 内存环境，充分利用多核 CPU 加速并行编译。
# - 优先增量构建速度，缓存最大化复用。
# - 保留 Gradle Build Cache 与 Configuration Cache。
# ============================================================

# ── JVM 参数 ───────────────────────────────────────────────
# Gradle Daemon 最大堆内存：从 1536m → 3072m
# 理由：low-memory 内存机器完全够用；Kotlin 编译和 R8 都需要大量堆空间
# MaxMetaspaceSize 从 512m → 1024m：避免 Kotlin 编译时元空间不足触发 GC
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m -Dfile.encoding=UTF-8 -Duser.country=CN -Duser.language=zh -Duser.variant

# ── 并行编译 ───────────────────────────────────────────────
org.gradle.parallel=false
org.gradle.workers.max=1
#   - 之前设为 1 是为了省内存，但 low-memory 内存完全不需要这么保守
#   - 4 个 worker 在 low-memory 机器上既能加速编译又不会导致内存抖动
org.gradle.parallel=true
org.gradle.workers.max=4

# ── 构建缓存 ───────────────────────────────────────────────
# org.gradle.caching=true：本地缓存任务执行产物
#   - 输入未变化时直接复用已有输出，跳过重复计算
#   - 增量构建的核心：改一行代码只重新编译受影响的任务
org.gradle.caching=true

# org.gradle.configuration-cache=true：缓存 Gradle 配置阶段结果
#   - 避免每次重新解析 build.gradle.kts 文件
#   - 对大型项目尤其重要（解析配置通常耗时 2-5 秒）
org.gradle.configuration-cache=true

# ── Android 构建优化 ───────────────────────────────────────
# android.useAapt2=true：使用 AAPT2（Android Asset Packaging Tool 2）
#   - AAPT2 支持增量编译资源：只重新打包变化的资源
#   - 比旧版 AAPT 快 3-10 倍
android.useAapt2=true

# ── AndroidX ──────────────────────────────────────────────
android.useAndroidX=true

# ── Kotlin ────────────────────────────────────────────────
kotlin.code.style=official

# Kotlin Daemon JVM 参数：从 512m → 1024m
# 理由：Kotlin 编译是 Android 构建中最耗时的阶段之一
#   - 512m 经常触发 Full GC，导致编译停顿
#   - 1024m 让 Kotlin 编译器有足够空间缓存类型信息
#   - MaxMetaspaceSize 从 256m → 512m：避免元空间不足
kotlin.daemon.jvmargs=-Xmx768m
org.gradle.daemon=false
