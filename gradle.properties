# ============================================================
# MyApplication：Gradle 项目级配置
# ============================================================
#
# 目标：
# - 适配 12GB 内存环境。
# - 优先稳定、低资源和可复现构建。
# - 保留 Gradle Build Cache 与 Configuration Cache。
# ============================================================

# Gradle Daemon 最大堆与元空间。
# 1536MB 足够当前 Android 基础工程，同时避免 Gradle 长期占用过高。
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# 当前电脑优先保证系统与 VS Code / CC 的可用内存。
# 单 Worker、关闭并行可避免构建时出现多个重型 JVM / Worker 同时抢占内存。
org.gradle.workers.max=1
org.gradle.parallel=false

# Build Cache：缓存任务执行产物。
# 输入未变化时，Gradle 可复用已有任务输出。
org.gradle.caching=true

# Configuration Cache：缓存 Gradle 配置阶段结果。
# 当前工程已成功构建，可继续保留。
org.gradle.configuration-cache=true

# AndroidX 是当前 Android 项目的标准依赖体系。
android.useAndroidX=true

# 使用 Kotlin 官方代码风格。
kotlin.code.style=official

# Kotlin 编译后台进程内存上限。
kotlin.daemon.jvmargs=-Xmx512m -XX:MaxMetaspaceSize=256m