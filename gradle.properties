# ============================================================
# Gradle 项目级配置
# ============================================================
#
# 目标：
# - 适配 12GB 内存环境，充分利用多核 CPU 加速并行编译。
# - 优先增量构建速度，缓存最大化复用。
# - 保留 Gradle Build Cache 与 Configuration Cache。
# ============================================================

# ── JVM 参数 ───────────────────────────────────────────────
# Gradle Daemon 最大堆内存：提升到 4096m
# 理由：12GB 内存机器完全够用；Kotlin 编译和 R8 都需要大量堆空间
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -Duser.country=CN -Duser.language=zh -Duser.variant

# ── 并行编译 ───────────────────────────────────────────────
# 启用并行编译，最多 4 个工作线程
org.gradle.parallel=true
org.gradle.workers.max=4

# ── 构建缓存 ───────────────────────────────────────────────
# 本地缓存任务执行产物，增量构建时跳过未变化的任务
org.gradle.caching=true

# 缓存 Gradle 配置阶段结果，避免重复解析 build.gradle.kts
org.gradle.configuration-cache=true

# ── 守护进程 ───────────────────────────────────────────────
# 保持开启，避免每次构建都重新启动 JVM
org.gradle.daemon=true

# ── Android 构建优化 ───────────────────────────────────────
# 使用 AAPT2 支持增量资源编译
android.useAapt2=true

# ── AndroidX ──────────────────────────────────────────────
android.useAndroidX=true

# ── Kotlin ────────────────────────────────────────────────
kotlin.code.style=official

# Kotlin Daemon JVM 参数：提升到 2048m
kotlin.daemon.jvmargs=-Xmx2048m
