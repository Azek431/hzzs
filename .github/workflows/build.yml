name: Build
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Verify Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Unit tests, lint and debug APK
        run: ./gradlew --no-daemon clean testDebugUnitTest lintDebug assembleDebug
      - name: Host C++ safety tests
        run: python3 tools/vision/run_host_tests.py
      - name: Install Python quality dependencies
        run: python3 -m pip install --disable-pip-version-check --quiet Pillow
      - name: Resource integrity
        run: python3 tools/quality/check_resources.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-and-debug-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            **/build/reports/**
