name: '构建验证'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: '构建、测试、Lint 与原生视觉回归'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: '检出代码'
        uses: actions/checkout@v7

      - name: '设置 JDK 17'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: '赋予 gradlew 执行权限'
        run: 'chmod +x ./gradlew'

      - name: '缓存 Gradle 依赖'
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', 'gradle/libs.versions.toml', '**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: '验证 Gradle Wrapper'
        run: './gradlew wrapper --dry-run'

      - name: '运行宿主机 C++ 合成视觉回归'
        run: 'python3 tools/hzzs-vision-tests/synthetic_regression.py'

      - name: '构建 Debug APK'
        run: './gradlew :app:assembleDebug --no-daemon'

      - name: '运行单元测试'
        run: './gradlew testDebugUnitTest --no-daemon'

      - name: '运行 Android Lint'
        run: './gradlew lintDebug --no-daemon'
