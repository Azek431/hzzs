name: '构建验证'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: '构建 Debug APK 并运行单元测试'
    runs-on: ubuntu-latest

    steps:
      - name: '检出代码'
        uses: actions/checkout@v4

      - name: '设置 JDK 17'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: '验证 Gradle Wrapper'
        run: './gradlew wrapper --dry-run'

      - name: '赋予 gradlew 执行权限'
        run: 'chmod +x ./gradlew'

      - name: '缓存 Gradle 依赖'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: '${{ runner.os }}-gradle-${{ hashFiles("gradle/wrapper/gradle-wrapper.properties", "build.gradle.kts", "settings.gradle.kts", "app/build.gradle.kts") }}'
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: '构建 Debug APK'
        run: './gradlew :app:assembleDebug --no-daemon'

      - name: '运行单元测试'
        run: './gradlew :app:testDebugUnitTest --no-daemon'
        continue-on-error: true
